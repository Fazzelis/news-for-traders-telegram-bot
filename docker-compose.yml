version: '3.8'

services:
  postgresql:
    image: postgres:latest
    container_name: "postgresql-news-tg-bot"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user_password
      POSTGRES_DB: news-tg-bot
    expose:
      - 5432
    ports:
      - "5432:5432"
    networks:
      - bot_network

  tg-bot:
    build: .
    container_name: "news-tg-bot"
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:user_password@postgresql:5432/news-tg-bot
      - BOT_TOKEN=${BOT_TOKEN}
      - PROXY_URL=${PROXY_URL}
    ports:
      - "8000:8000"
    networks:
      - bot_network

networks:
  bot_network:
    driver: bridge